services:
  app:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR:-/home/umbrel/umbrel/app-data/argus-store-bot/data}:/app
    ports:
      - "${APP_PORT:-8889}:8888"
    environment:
      - NODE_ENV=production
      - WORKSPACE_DIR=/app
      - STARTING_CAPITAL=302
      - BOT_TIMEZONE=America/New_York
    command: >
      sh -c "apk add --no-cache python3 py3-pip sqlite 2>/dev/null && pip3 install optuna --quiet --break-system-packages 2>/dev/null; echo IyEvYmluL3NoCmNkIC9hcHAKbm9kZSBkYXNoYm9hcmQtc2VydmVyLXYzLmpzICYKbm9kZSBib3QtdjguanMgPj4gL2FwcC9ib3QubG9nIDI+PiAvYXBwL2JvdC1lcnJvci5sb2cK | base64 -d > /app/start.sh && chmod +x /app/start.sh && rm -f /app/.bot-lock.pid && sh /app/start.sh"
