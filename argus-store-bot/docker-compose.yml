services:
  app:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data:/app
    ports:
      - "${APP_PORT}:8888"
    environment:
      - NODE_ENV=production
      - WORKSPACE_DIR=/app
    command: sh -c "apk add --no-cache python3 py3-pip sqlite 2>/dev/null && pip3 install optuna --quiet --break-system-packages 2>/dev/null; sh /app/start.sh"
